services:
  backend:
    build: ./backend
    container_name: aicouncil-backend
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATABASE_URL=postgresql://postgres:ai_council_pass@db:5432/ai_council
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    networks:
      - aicouncil-network

  db:
    image: ankane/pgvector
    container_name: aicouncil-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_council
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ai_council_pass
    volumes:
      - aicouncil-db-data:/var/lib/postgresql/data
    networks:
      - aicouncil-network

  frontend:
    build: ./frontend
    container_name: aicouncil-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aicouncil-network

  jenkins:
    build: ./jenkins
    container_name: aicouncil-jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - aicouncil-jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/.env_host
    networks:
      - aicouncil-network

networks:
  aicouncil-network:
    driver: bridge

volumes:
  aicouncil-db-data:
  ollama-data:
  aicouncil-jenkins-data:

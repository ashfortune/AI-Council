services:
  backend:
    build: ./backend
    container_name: aicouncil-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
      - db
    networks:
      - aicouncil-network

  ollama:
    image: ollama/ollama:latest
    container_name: aicouncil-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - aicouncil-network

  db:
    image: ankane/pgvector
    container_name: aicouncil-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_council
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ai_council_pass
    volumes:
      - aicouncil-db-data:/var/lib/postgresql/data
    networks:
      - aicouncil-network

  frontend:
    build: ./frontend
    container_name: aicouncil-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - aicouncil-network

networks:
  aicouncil-network:
    driver: bridge

volumes:
  aicouncil-db-data:
  ollama-data:
